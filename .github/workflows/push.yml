name: CI/CD

on:
  push:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - name: Checkout ${{ github.sha }}
        uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install dependencies
        run: npm ci
      - name: Test
        run: npm test

  cd:
    if: github.ref == 'refs/heads/master'
    needs: ci
    runs-on: ubuntu-latest
    # Only the deploy job may mint OIDC tokens (the role trust is also pinned
    # to this repo's master ref in aws-shared-infra)
    permissions:
      id-token: write
      contents: read
    concurrency:
      group: deploy-dev
      cancel-in-progress: false
    defaults:
      run:
        working-directory: functions
    steps:
      - name: Checkout ${{ github.sha }}
        uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::338337944728:role/dealer-tech-ci
          aws-region: eu-west-1
      - name: Install dependencies
        run: npm ci
      - name: Create env.yml
        run: echo "$ENVYML" > env.yml
        env:
          ENVYML: ${{ secrets.ENVYML }}
      - name: Deploy to dev environment
        run: npm run deploy:dev
